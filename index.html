<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>College Brawl — ИСПРАВЛЕННАЯ ВЕРСИЯ</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a, #03060a);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Courier New', monospace; margin: 0; padding: 20px;
        }
        .game-container {
            background: #0d0a07; border-radius: 32px;
            padding: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        canvas {
            display: block; margin: 0 auto; border-radius: 20px;
            cursor: pointer; box-shadow: 0 0 0 4px #6b4c34;
        }
        .info-panel {
            margin-top: 18px; display: flex; justify-content: space-between;
            align-items: center; gap: 15px; flex-wrap: wrap;
            background: #1b1510; padding: 12px 28px; border-radius: 60px;
        }
        .status {
            background: #000000aa; padding: 10px 28px; border-radius: 50px;
            color: #ffdfa5; font-weight: bold; backdrop-filter: blur(4px);
            font-size: 16px; font-family: monospace;
        }
        button {
            background: #8b3c1a; border: none; font-family: monospace;
            font-weight: bold; font-size: 15px; padding: 10px 32px;
            border-radius: 50px; color: #fff0cf; cursor: pointer;
            box-shadow: 0 4px 0 #4f240c;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #4f240c; }
        .diff-indicator {
            background: #2a2a1a; padding: 6px 15px; border-radius: 30px;
            font-size: 13px; color: #ffcc88;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div class="info-panel">
            <div class="status" id="gameStatus">🏫 COLLEGE BRAWL | ИСПРАВЛЕНА</div>
            <div class="diff-indicator" id="diffIndicator">СРЕДНЯЯ</div>
            <button id="resetBtn">🔄 СБРОС</button>
            <button id="menuBtn">🎮 МЕНЮ</button>
        </div>
    </div>
</div>

<script>
(function(){
    // ==================== СОСТОЯНИЕ ====================
    let gameState = "menu";
    let currentLevel = 1;
    let cutsceneType = null;
    let cutsceneStep = 0;
    let storyStep = 0;
    
    // ==================== КАРТЫ ====================
    let currentMap = { width: 20, height: 15, tiles: [], healZones: [], enemies: [] };
    let player = { x: 10, y: 7 };
    
    function buildMapClass() {
        let w=20, h=15;
        let tiles = Array(h).fill().map(() => Array(w).fill(0));
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=3;k<8;k++) { tiles[5][k]=2; tiles[8][k]=2; }
        tiles[10][5]=2; tiles[10][6]=2;
        tiles[12][w-2] = 3;
        return { 
            width:w, height:h, tiles: tiles, 
            healZones: [
                {x:5,y:3, used:false},{x:5,y:4, used:false},{x:5,y:5, used:false},
                {x:5,y:6, used:false},{x:5,y:7, used:false},{x:8,y:3, used:false},
                {x:8,y:4, used:false},{x:8,y:5, used:false},{x:8,y:6, used:false},
                {x:8,y:7, used:false},{x:10,y:5, used:false},{x:10,y:6, used:false}
            ],
            enemies: [
                {x:11, y:12, type:"freshman", alive:true, name:"Двоечник", required:false},
                {x:14, y:6, type:"bully", alive:true, name:"Задира", required:true},
                {x:8, y:11, type:"freshman", alive:true, name:"Двоечник", required:false},
                {x:4, y:8, type:"freshman", alive:true, name:"Двоечник", required:false}
            ],
            requiredToKill: 1  // нужно убить 1 врага для перехода
        };
    }
    
    function buildMapCorridor() {
        let w=25, h=18;
        let tiles = Array(h).fill().map(() => Array(w).fill(0));
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=4;k<8;k++) { tiles[k][10]=1; tiles[k][15]=1; }
        tiles[12][20]=1; tiles[13][20]=1;
        tiles[3][5]=2; tiles[14][22]=2;
        tiles[8][w-2] = 3;
        return {
            width:w, height:h, tiles: tiles,
            healZones: [{x:3,y:5, used:false}, {x:14,y:22, used:false}],
            enemies: [
                {x:7, y:8, type:"teacher", alive:true, name:"Злой препод", required:true},
                {x:15, y:9, type:"starosta", alive:true, name:"Староста", required:false},
                {x:10, y:14, type:"teacher", alive:true, name:"Злой препод", required:false},
                {x:18, y:7, type:"starosta", alive:true, name:"Староста", required:false}
            ],
            requiredToKill: 1
        };
    }
    
    function buildMapCanteen() {
        let w=22, h=16;
        let tiles = Array(h).fill().map(() => Array(w).fill(0));
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=4;k<10;k++) { tiles[6][k]=2; tiles[10][k]=2; }
        tiles[7][w-2] = 3;
        let healZones = [];
        for(let k=4;k<10;k++) { healZones.push({x:6,y:k, used:false}); healZones.push({x:10,y:k, used:false}); }
        return {
            width:w, height:h, tiles: tiles,
            healZones: healZones,
            enemies: [
                {x:15, y:8, type:"cook", alive:true, name:"Повариха", required:true},
                {x:18, y:5, type:"bully", alive:true, name:"Задира", required:false},
                {x:5, y:13, type:"freshman", alive:true, name:"Двоечник", required:false},
                {x:14, y:13, type:"teacher", alive:true, name:"Злой препод", required:false}
            ],
            requiredToKill: 1
        };
    }
    
    function buildMapOffice() {
        let w=20, h=15;
        let tiles = Array(h).fill().map(() => Array(w).fill(0));
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=8;k<12;k++) tiles[7][k]=2;
        tiles[5][10]=2; tiles[5][11]=2;
        return {
            width:w, height:h, tiles: tiles,
            healZones: [{x:7,y:8, used:false},{x:7,y:9, used:false},{x:7,y:10, used:false},{x:7,y:11, used:false},{x:5,y:10, used:false},{x:5,y:11, used:false}],
            enemies: [{x:10, y:7, type:"boss", alive:true, name:"ПРОРЕКТОР ТЕНЕЙ", required:true}],
            requiredToKill: 1
        };
    }
    
    function loadLevel(level) {
        if(level === 1) currentMap = buildMapClass();
        else if(level === 2) currentMap = buildMapCorridor();
        else if(level === 3) currentMap = buildMapCanteen();
        else currentMap = buildMapOffice();
        player.x = Math.floor(currentMap.width/2);
        player.y = 5;
    }
    
    function getRequiredKillsCount() {
        let killed = 0;
        for(let e of currentMap.enemies) {
            if(e.required && !e.alive) killed++;
        }
        return killed;
    }
    
    function getTotalRequiredCount() {
        let total = 0;
        for(let e of currentMap.enemies) {
            if(e.required) total++;
        }
        return total;
    }
    
    function canGoToNextLevel() {
        return getRequiredKillsCount() >= (currentMap.requiredToKill || 1);
    }
    
    // ==================== ГЕРОИ (СИЛЬНЫЕ) ====================
    let heroes = [
        { id:0, name:"Глеб", role:"Танк", hp:900, maxHp:900, mp:120, maxMp:120, atk:80, def:110, 
          skill:"Умный удар", skillDmg:100, skillEffect:"defense_down", mpCost:8, type:"dmg", exp:0, level:1,
          phrases:{ start:"Вероятность победы высока!", victory:"Тактика принесла результат!", heal:"Благодарю!", death:"Ошибка..." } },
        { id:1, name:"Игнат", role:"Дамагер", hp:750, maxHp:750, mp:30, maxMp:30, atk:140, def:60, 
          skill:"ГАНТЕЛЯ", skillDmg:200, hpCost:10, type:"dmg", exp:0, level:1,
          phrases:{ start:"ГА! ШТАНГУ ПОДНЯЛ!", victory:"ГА! ПОБЕДА!", heal:"ФУХ...", death:"ГАНТЕЛЯ..." } },
        { id:2, name:"Одирлбекк", role:"Ассасин", hp:550, maxHp:550, mp:50, maxMp:50, atk:160, def:40, 
          skill:"Теневой удар", skillDmg:220, hpCost:12, type:"dmg", exp:0, level:1,
          phrases:{ start:"...", victory:"...", heal:"...", death:"..." } },
        { id:3, name:"Ярик", role:"Хилер", hp:480, maxHp:480, mp:150, maxMp:150, atk:45, def:55, 
          skill:"Лечение", heal:150, mpCost:15, type:"heal", exp:0, level:1,
          phrases:{ start:"По факту, шанс высок!", victory:"Логично!", heal:"Рационально!", death:"Просчёт..." } }
    ];
    
    // ==================== ВРАГИ (СЛАБЕЕ) ====================
    const enemyDB = {
        freshman: { name:"Двоечник", hp:320, atk:48, def:30, exp:60, dialog:"Чё надо?" },
        bully: { name:"Задира", hp:450, atk:62, def:35, exp:90, dialog:"Слабаки!" },
        teacher: { name:"Злой препод", hp:520, atk:72, def:40, exp:130, dialog:"Двойка!" },
        starosta: { name:"Староста", hp:480, atk:65, def:38, exp:110, dialog:"Всё расскажу!" },
        cook: { name:"Повариха", hp:500, atk:68, def:38, exp:120, dialog:"Компот получите!", poison:true },
        boss: { name:"ПРОРЕКТОР ТЕНЕЙ", hp:1200, atk:90, def:55, exp:600, dialog:"Изгнание!" }
    };
    
    let battleEnemies = [];
    let inBattleTurn = "player";
    let selectedHero = null;
    let selectedAction = null;
    let enemyDebuffs = {};
    
    let currentDifficulty = "medium";
    
    function applyDifficulty() {
        let modHeroHp = 1, modHeroAtk = 1, modEnemyHp = 1, modEnemyAtk = 1;
        if(currentDifficulty === "easy") { modHeroHp = 1.2; modHeroAtk = 1.15; modEnemyHp = 0.8; modEnemyAtk = 0.85; }
        if(currentDifficulty === "hard") { modHeroHp = 0.9; modHeroAtk = 0.95; modEnemyHp = 1.2; modEnemyAtk = 1.15; }
        for(let h of heroes) {
            let baseHp = (h.id===0?900: h.id===1?750: h.id===2?550:480);
            let baseAtk = (h.id===0?80: h.id===1?140: h.id===2?160:45);
            h.maxHp = Math.floor(baseHp * modHeroHp);
            h.hp = h.maxHp;
            h.atk = Math.floor(baseAtk * modHeroAtk);
        }
        window.enemyMod = { hp: modEnemyHp, atk: modEnemyAtk };
        let diffText = currentDifficulty === "easy" ? "🍃 ЛЁГКАЯ" : (currentDifficulty === "medium" ? "⚖️ СРЕДНЯЯ" : "🔥 ТЯЖЁЛАЯ");
        document.getElementById("diffIndicator").innerText = diffText;
    }
    
    function scaleEnemy(e) {
        let mod = window.enemyMod || { hp:1, atk:1 };
        return {
            name: e.name, hp: Math.floor(e.hp * mod.hp), maxHp: Math.floor(e.hp * mod.hp),
            atk: Math.floor(e.atk * mod.atk), def: e.def, exp: e.exp, dialog: e.dialog, poison: e.poison || false
        };
    }
    
    function healAtZone(zone) {
        if(zone.used) { setMsg("💊 Здесь уже отдыхали!"); return false; }
        for(let h of heroes) {
            h.hp = Math.min(h.maxHp, h.hp + 150);
            h.mp = Math.min(h.maxMp, h.mp + 50);
        }
        zone.used = true;
        setMsg("💊 Отдых! +150 HP, +50 MP");
        return true;
    }
    
    function addExp(amount) {
        for(let h of heroes) {
            h.exp += amount;
            if(h.exp >= 100 && h.level < 6) {
                h.level++;
                h.exp = 0;
                h.maxHp = Math.floor(h.maxHp * 1.1);
                h.hp = h.maxHp;
                h.atk = Math.floor(h.atk * 1.08);
                setMsg("✨ " + h.name + " → " + h.level + " уровень! ✨");
            }
        }
    }
    
    function setMsg(msg) { 
        let div = document.getElementById("gameStatus");
        if(div) div.innerText = msg;
    }
    
    // ==================== БОЕВАЯ СИСТЕМА ====================
    function startBattle(enemyType) {
        let template = enemyDB[enemyType];
        if(!template) return;
        battleEnemies = [scaleEnemy(template)];
        if(enemyType === "teacher") battleEnemies.push(scaleEnemy(enemyDB.starosta));
        if(enemyType === "freshman") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        if(enemyType === "bully") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        if(enemyType === "cook") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        gameState = "battle";
        inBattleTurn = "player";
        selectedHero = null;
        enemyDebuffs = {};
        setMsg("⚔️ БОЙ! " + heroes[0].phrases.start);
        renderGame();
    }
    
    function heroAttack(hero, enemyIdx) {
        let enemy = battleEnemies[enemyIdx];
        let def = enemy.def;
        if(enemyDebuffs[enemyIdx]?.defenseDown) def = Math.floor(def * 0.7);
        let dmg = Math.max(15, hero.atk + Math.floor(Math.random() * 25) - def);
        enemy.hp -= dmg;
        setMsg(hero.name + " атакует → -" + dmg + " HP!");
        return true;
    }
    
    function heroSkill(hero, enemyIdx) {
        if(hero.type === "heal") {
            if(hero.mp < 15) { setMsg("❗ Нет MP!"); return false; }
            let target = heroes.find(h => h.hp < h.maxHp) || heroes[0];
            target.hp = Math.min(target.maxHp, target.hp + 150);
            hero.mp -= 15;
            setMsg(hero.phrases.heal + " +150 HP для " + target.name);
            return true;
        } else {
            let costMp = hero.mpCost || 0;
            let hpCost = hero.hpCost || 0;
            if(hpCost > 0 && hero.hp <= hpCost) { setMsg("❗ Мало HP!"); return false; }
            if(costMp > 0 && hero.mp < costMp) { setMsg("❗ Мало MP!"); return false; }
            let def = battleEnemies[enemyIdx].def;
            if(enemyDebuffs[enemyIdx]?.defenseDown) def = Math.floor(def * 0.7);
            let dmg = hero.atk * 2 + hero.skillDmg + Math.floor(Math.random() * 40);
            let finalDmg = Math.max(30, dmg - def);
            battleEnemies[enemyIdx].hp -= finalDmg;
            if(hpCost > 0) hero.hp -= hpCost;
            else hero.mp -= costMp;
            if(hero.id === 0) { enemyDebuffs[enemyIdx] = { defenseDown: true }; setMsg("⬇️ Защита врага снижена!"); }
            setMsg(hero.phrases.start + " → -" + finalDmg + " урона!");
            return true;
        }
    }
    
    function attemptEscape() {
        if(gameState !== "battle" || inBattleTurn !== "player") return false;
        let chance = (currentDifficulty === "easy") ? 0.8 : (currentDifficulty === "medium") ? 0.6 : 0.4;
        if(Math.random() < chance) {
            setMsg("🏃‍♂️ Удалось сбежать!");
            gameState = "gameplay";
            renderGame();
            return true;
        } else {
            setMsg("😵 Не удалось сбежать! Враги атакуют!");
            inBattleTurn = "enemy";
            renderGame();
            setTimeout(() => enemyBattleTurn(), 400);
            return false;
        }
    }
    
    function enemyBattleTurn() {
        let alive = heroes.filter(h => h.hp > 0);
        if(alive.length === 0) { gameState = "gameover"; renderGame(); return; }
        
        for(let ei=0; ei<battleEnemies.length; ei++) {
            let e = battleEnemies[ei];
            if(e.hp <= 0) continue;
            let target = alive[Math.floor(Math.random() * alive.length)];
            let dmg = Math.max(8, e.atk + Math.floor(Math.random() * 15) - Math.floor(target.def / 2));
            target.hp -= dmg;
            setMsg(e.name + ": " + e.dialog + " → " + target.name + " -" + dmg + " HP");
            if(target.hp <= 0) setMsg(target.name + " без сознания!");
            if(e.poison && Math.random()<0.25) { target.hp -= 15; setMsg("☠️ Отравление! -15 HP"); }
        }
        
        if(heroes.every(h => h.hp <= 0)) { gameState = "gameover"; renderGame(); return; }
        if(battleEnemies.every(e => e.hp <= 0)) {
            let totalExp = battleEnemies.reduce((s,e) => s + e.exp, 0);
            addExp(totalExp);
            for(let em of currentMap.enemies) {
                if(em.alive && em.name === battleEnemies[0]?.name) { em.alive = false; break; }
            }
            
            // ПОБЕДА НАД БОССОМ → СРАЗУ ФИНАЛ!
            if(currentLevel === 4 && battleEnemies[0]?.name === "ПРОРЕКТОР ТЕНЕЙ") {
                startCredits();
                return;
            }
            
            setMsg("ПОБЕДА! +" + totalExp + " опыта");
            gameState = "gameplay";
            renderGame();
            return;
        }
        inBattleTurn = "player";
        renderGame();
    }
    
    function playerBattle(heroIdx, action, enemyIdx) {
        if(gameState !== "battle" || inBattleTurn !== "player") return false;
        let hero = heroes[heroIdx];
        if(hero.hp <= 0) { setMsg(hero.name + " без сознания!"); return false; }
        let enemy = battleEnemies[enemyIdx];
        if(!enemy || enemy.hp <= 0) return false;
        
        let ok = false;
        if(action === "attack") ok = heroAttack(hero, enemyIdx);
        else ok = heroSkill(hero, enemyIdx);
        if(!ok) return false;
        
        if(battleEnemies.every(e => e.hp <= 0)) {
            let totalExp = battleEnemies.reduce((s,e) => s + e.exp, 0);
            addExp(totalExp);
            for(let em of currentMap.enemies) {
                if(em.alive && em.name === battleEnemies[0]?.name) { em.alive = false; break; }
            }
            if(currentLevel === 4 && battleEnemies[0]?.name === "ПРОРЕКТОР ТЕНЕЙ") {
                startCredits();
                return true;
            }
            setMsg("ПОБЕДА! +" + totalExp + " опыта");
            gameState = "gameplay";
            renderGame();
            return true;
        }
        inBattleTurn = "enemy";
        renderGame();
        setTimeout(() => enemyBattleTurn(), 450);
        return true;
    }
    
    // ==================== КАТСЦЕНЫ ====================
    let storyLines = [
        { speaker: "Рассказчик", text: "Колледж... обычный день... но что-то пошло не так." },
        { speaker: "Глеб", text: "По моим расчётам, Проректор теней захватил деканат." },
        { speaker: "Игнат", text: "ГА! ШТАНГУ ПОДНЯЛ! РАЗБЕРУСЬ!" },
        { speaker: "Одирлбекк", text: "..." },
        { speaker: "Ярик", text: "По факту, шанс на успех высок. Действуем!" }
    ];
    
    function startStorytelling() {
        gameState = "storytelling";
        storyStep = 0;
        renderGame();
    }
    
    function advanceStory() {
        if(storyStep < storyLines.length - 1) {
            storyStep++;
            renderGame();
        } else {
            gameState = "gameplay";
            loadLevel(1);
            renderGame();
        }
    }
    
    let cutsceneLines = [];
    function startCutscene(type) {
        cutsceneType = type;
        cutsceneStep = 0;
        if(type === "level1_complete") {
            cutsceneLines = [
                { speaker: "Глеб", text: "Класс пройден. Идём в коридор." },
                { speaker: "Игнат", text: "ГА! ЭТИ СЛАБАКИ ДАЖЕ НЕ ПОТНЫЕ!" }
            ];
        } else if(type === "level2_complete") {
            cutsceneLines = [
                { speaker: "Глеб", text: "Коридор зачищен. Следующая остановка — столовая." },
                { speaker: "Ярик", text: "Повариха может подать отравленный компот. Осторожно." }
            ];
        } else if(type === "level3_complete") {
            cutsceneLines = [
                { speaker: "Глеб", text: "Столовая очищена. Теперь последний рывок — кабинет директора." },
                { speaker: "Игнат", text: "ГА! ПРОРЕКТОР! ДАВНО ХОТЕЛ ПОБОРОТЬСЯ!" }
            ];
        }
        gameState = "cutscene";
        renderGame();
    }
    
    function advanceCutscene() {
        if(cutsceneStep < cutsceneLines.length - 1) {
            cutsceneStep++;
            renderGame();
        } else {
            if(cutsceneType === "level1_complete") { currentLevel = 2; loadLevel(2); gameState = "gameplay"; }
            else if(cutsceneType === "level2_complete") { currentLevel = 3; loadLevel(3); gameState = "gameplay"; }
            else if(cutsceneType === "level3_complete") { currentLevel = 4; loadLevel(4); gameState = "gameplay"; }
            renderGame();
        }
    }
    
    // ==================== ТИТРЫ ====================
    let creditsStep = 0;
    let creditsLines = [
        "═══════════════════════════════════════",
        "        COLLEGE BRAWL",
        "═══════════════════════════════════════",
        "",
        "★ ГЛАВНЫЕ ГЕРОИ ★",
        "",
        "ГЛЕБ — Танк: «Колледж спасён!»",
        "ИГНАТ — Дамагер: «ГА! ШТАНГА ПОБЕДИЛА!»",
        "ОДИРЛБЕКК — Ассасин: «...конец.»",
        "ЯРИК — Хилер: «Логично! Задача выполнена.»",
        "",
        "═══════════════════════════════════════",
        "   СПАСИБО ЗА ИГРУ!",
        "═══════════════════════════════════════"
    ];
    
    function startCredits() {
        gameState = "credits";
        creditsStep = 0;
        renderGame();
        let interval = setInterval(() => {
            if(creditsStep < creditsLines.length - 1) {
                creditsStep++;
                renderGame();
            } else {
                clearInterval(interval);
                setTimeout(() => { showGroupPhoto(); }, 2000);
            }
        }, 1800);
    }
    
    function showGroupPhoto() {
        gameState = "group_photo";
        renderGame();
        setTimeout(() => { gameState = "menu"; renderGame(); }, 5000);
    }
    
    // ==================== ПЕРЕДВИЖЕНИЕ ====================
    function tryMove(dx, dy) {
        if(gameState !== "gameplay") return;
        let nx = player.x + dx, ny = player.y + dy;
        if(nx<0 || nx>=currentMap.width || ny<0 || ny>=currentMap.height) return;
        if(currentMap.tiles[ny][nx] === 1) return;
        if(currentMap.tiles[ny][nx] === 2) {
            let zone = currentMap.healZones.find(z => z.x === nx && z.y === ny);
            if(zone) healAtZone(zone);
        }
        if(currentMap.tiles[ny][nx] === 3) {
            if(canGoToNextLevel()) {
                if(currentLevel === 1) startCutscene("level1_complete");
                else if(currentLevel === 2) startCutscene("level2_complete");
                else if(currentLevel === 3) startCutscene("level3_complete");
            } else {
                let need = (currentMap.requiredToKill || 1) - getRequiredKillsCount();
                setMsg(`⚠️ Нужно убить ещё ${need} обязательных врагов! (можно не всех)`);
            }
            return;
        }
        player.x = nx; player.y = ny;
        let enemy = currentMap.enemies.find(e => e.alive && e.x === player.x && e.y === player.y);
        if(enemy) { startBattle(enemy.type); }
        renderGame();
    }
    
    // ==================== ОТРИСОВКА ====================
    let canvas = document.getElementById("gameCanvas");
    let ctx = canvas.getContext("2d");
    
    function drawWrappedText(text, x, y, maxW, lineH, fontSize) {
        ctx.font = fontSize + "px monospace";
        let line = '';
        for(let i=0;i<text.length;i++) {
            let test = line + text[i];
            if(ctx.measureText(test).width > maxW && line.length>0) {
                ctx.fillText(line, x, y);
                line = text[i];
                y += lineH;
            } else { line = test; }
        }
        ctx.fillText(line, x, y);
    }
    
    function drawMenu() {
        ctx.fillStyle = "#070c12"; ctx.fillRect(0,0,1280,720);
        ctx.fillStyle = "#e9d49c"; ctx.font = "bold 64 monospace"; ctx.fillText("COLLEGE BRAWL", 380, 140);
        ctx.font = "32px monospace"; ctx.fillStyle = "#ffbc6e";
        ctx.fillText("▶ НОВАЯ ИГРА", 520, 270);
        ctx.fillText("⚙ СЛОЖНОСТЬ: " + (currentDifficulty === "easy" ? "ЛЁГКАЯ" : (currentDifficulty === "medium" ? "СРЕДНЯЯ" : "ТЯЖЁЛАЯ")), 460, 370);
        ctx.fillText("🚪 ВЫХОД", 560, 470);
        ctx.fillStyle = "#bba87a"; ctx.font = "22px monospace"; ctx.fillText("Кликни мышкой по пункту меню", 470, 620);
    }
    
    function drawStorytelling() {
        ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0,0,1280,720);
        let line = storyLines[storyStep];
        ctx.fillStyle = "#f7e2b0"; ctx.font = "bold 46 monospace"; ctx.fillText(line.speaker, 80, 180);
        drawWrappedText(line.text, 80, 270, 1100, 50, 34);
        ctx.fillStyle = "#c9aa6f"; ctx.font = "24px monospace"; ctx.fillText("👉 Кликни для продолжения 👈", 480, 660);
    }
    
    function drawCutscene() {
        ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0,0,1280,720);
        let line = cutsceneLines[cutsceneStep];
        ctx.fillStyle = "#f7e2b0"; ctx.font = "bold 44 monospace"; ctx.fillText(line.speaker, 80, 200);
        drawWrappedText(line.text, 80, 300, 1100, 48, 32);
        ctx.fillStyle = "#c9aa6f"; ctx.font = "24px monospace"; ctx.fillText("👉 Кликни для продолжения 👈", 480, 660);
    }
    
    function drawGameplay() {
        ctx.fillStyle = "#1f2a1b"; ctx.fillRect(0,0,1280,720);
        let tw = 1280/currentMap.width;
        let th = 720/currentMap.height;
        for(let y=0;y<currentMap.height;y++){
            for(let x=0;x<currentMap.width;x++){
                let tile = currentMap.tiles[y][x];
                let col = "#8faa7b";
                if(tile===1) col = "#5a4232";
                else if(tile===2) col = "#8fbc6e";
                else if(tile===3) col = "#d4a259";
                ctx.fillStyle = col; ctx.fillRect(x*tw, y*th, tw-1, th-1);
                if(tile===2) { 
                    let zone = currentMap.healZones.find(z => z.x === x && z.y === y);
                    if(!zone || !zone.used) { ctx.fillStyle="#a5d66b"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("💊", x*tw+tw/3, y*th+th-8); }
                }
                if(tile===3) { ctx.fillStyle="#ffd966"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("🚪", x*tw+tw/4, y*th+th-8); }
            }
        }
        for(let e of currentMap.enemies) {
            if(e.alive) {
                ctx.fillStyle = e.required ? "#c2422a" : "#aa8844";
                ctx.beginPath(); ctx.arc(e.x*tw+tw/2, e.y*th+th/2, th/3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.font="bold "+(th/2.5)+"px monospace"; 
                ctx.fillText(e.required ? "⚠️" : "👹", e.x*tw+tw/3, e.y*th+th-10);
            }
        }
        ctx.fillStyle = "#4a86c9"; ctx.fillRect(player.x*tw+5, player.y*th+5, tw-10, th-10);
        ctx.fillStyle = "white"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("😎", player.x*tw+tw/3.5, player.y*th+th-12);
        
        ctx.fillStyle = "#2a241ecc"; ctx.fillRect(0,0,550,200);
        ctx.fillStyle = "#ffdfa5"; ctx.font = "20px monospace"; 
        let levelNames = ["", "КЛАСС", "КОРИДОР", "СТОЛОВАЯ", "КАБИНЕТ"];
        ctx.fillText("📍 " + levelNames[currentLevel], 15, 40);
        let aliveCnt = currentMap.enemies.filter(e => e.alive).length;
        ctx.fillText("👥 Врагов всего: " + aliveCnt, 15, 75);
        let requiredKilled = getRequiredKillsCount();
        let requiredTotal = getTotalRequiredCount();
        ctx.fillText("⚠️ Обязательных убито: " + requiredKilled + "/" + requiredTotal, 15, 110);
        let availableHeals = currentMap.healZones.filter(z => !z.used).length;
        ctx.fillText("💊 Лечений осталось: " + availableHeals, 15, 145);
        if(canGoToNextLevel()) ctx.fillText("✅ ДВЕРЬ ОТКРЫТА! ИДИ К ВЫХОДУ!", 15, 180);
        else ctx.fillText("❌ УБЕЙ ЕЩЁ ОБЯЗАТЕЛЬНЫХ ВРАГОВ!", 15, 180);
    }
    
    function drawBattle() {
        ctx.fillStyle = "#0c0a07"; ctx.fillRect(0,0,1280,720);
        let turnText = (inBattleTurn === "player") ? "⚔️ ТВОЙ ХОД ⚔️" : "😈 ХОД ВРАГОВ 😈";
        ctx.fillStyle = (inBattleTurn === "player") ? "#aaffaa" : "#ff8888";
        ctx.font = "bold 36 monospace"; ctx.fillText(turnText, 500, 55);
        
        let yh = 120;
        for(let h of heroes) {
            ctx.fillStyle = "#443829"; ctx.fillRect(30, yh, 450, 105);
            ctx.fillStyle = "#fcd894"; ctx.font = "bold 22 monospace"; 
            ctx.fillText(h.name + " Lv." + h.level + " | " + h.role, 55, yh+35);
            ctx.fillStyle = "#c24222"; ctx.fillRect(55, yh+55, 280*(h.hp/h.maxHp), 16);
            ctx.fillStyle = "#3f82b0"; ctx.fillRect(55, yh+77, 280*(h.mp/h.maxMp), 12);
            ctx.fillStyle = "white"; ctx.font = "18px monospace"; 
            ctx.fillText("❤️ " + Math.floor(h.hp) + "/" + h.maxHp + "  ✨" + h.mp, 60, yh+98);
            yh += 115;
        }
        
        let ye = 140;
        for(let ei=0; ei<battleEnemies.length; ei++) {
            let e = battleEnemies[ei];
            ctx.fillStyle = "#632e1f"; ctx.fillRect(780, ye, 420, 90);
            ctx.fillStyle = "#ffc285"; ctx.font = "bold 26 monospace"; ctx.fillText(e.name, 810, ye+35);
            ctx.fillStyle = "#d93f2b"; ctx.fillRect(810, ye+58, 300*(e.hp/e.maxHp), 16);
            ctx.fillStyle = "#ffd59c"; ctx.font = "18px monospace"; ctx.fillText("❤️ " + Math.floor(e.hp) + "/" + e.maxHp, 820, ye+82);
            if(enemyDebuffs[ei]?.defenseDown) { ctx.fillStyle = "#ffaa66"; ctx.fillText("⬇️ ЗАЩИТА СНИЖЕНА", 810, ye+108); }
            ye += 105;
        }
        
        ctx.fillStyle = "#e8dbbd"; ctx.font = "20px monospace";
        ctx.fillText("👆 Кликни по герою → выбери действие (OK=атака, Отмена=навык) → кликни по врагу", 330, 670);
        ctx.fillStyle = "#ffaa66";
        ctx.fillText("🏃‍♂️ Нажми ПРОБЕЛ чтобы СБЕЖАТЬ (60% шанс)", 490, 705);
    }
    
    function drawGameOver() {
        ctx.fillStyle = "#000000bb"; ctx.fillRect(0,0,1280,720);
        ctx.fillStyle = "#bf6f52"; ctx.font = "bold 56 monospace"; ctx.fillText("❌ ПОРАЖЕНИЕ ❌", 480, 300);
        ctx.font = "28px monospace"; ctx.fillStyle = "#cfaa7a"; 
        ctx.fillText("Колледж пал под натиском теней...", 440, 400);
        ctx.font = "22px monospace";
        ctx.fillText("💡 Совет: попробуй ЛЁГКУЮ сложность в меню", 450, 480);
        ctx.fillText("Нажми ГЛАВНОЕ МЕНЮ", 540, 560);
    }
    
    function drawCredits() {
        ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0,0,1280,720);
        ctx.fillStyle = "#ffdd88"; ctx.font = "bold 32 monospace";
        for(let i=0; i<=creditsStep; i++) {
            let yPos = 80 + i*40;
            if(yPos < 700) ctx.fillText(creditsLines[i], 300, yPos);
        }
    }
    
    function drawGroupPhoto() {
        ctx.fillStyle = "#1a1a2a"; ctx.fillRect(0,0,1280,720);
        ctx.fillStyle = "#ffdd88"; ctx.font = "bold 48 monospace";
        ctx.fillText("★ ГРУППОВОЕ ФОТО ★", 420, 100);
        ctx.font = "36px monospace";
        let photos = ["[ ГЛЕБ ]", "[ ИГНАТ ]", "[ ОДИРЛБЕКК ]", "[ ЯРИК ]"];
        let roles = ["Танк", "Дамагер", "Ассасин", "Хилер"];
        let xPos = [180, 430, 680, 930];
        for(let i=0; i<photos.length; i++) {
            ctx.fillStyle = "#4a86c9"; ctx.fillRect(xPos[i], 250, 180, 180);
            ctx.fillStyle = "white"; ctx.font = "bold 30px monospace"; ctx.fillText(photos[i], xPos[i]+15, 370);
            ctx.fillStyle = "#ffaa66"; ctx.font = "24px monospace";
            ctx.fillText(roles[i], xPos[i]+45, 430);
        }
        ctx.fillStyle = "#bba87a"; ctx.font = "24px monospace";
        ctx.fillText("СПАСИБО ЗА ИГРУ!", 520, 580);
        ctx.fillText("Возврат в меню через 5 секунд", 480, 650);
    }
    
    function renderGame() {
        if(gameState === "menu") drawMenu();
        else if(gameState === "storytelling") drawStorytelling();
        else if(gameState === "cutscene") drawCutscene();
        else if(gameState === "gameplay") drawGameplay();
        else if(gameState === "battle") drawBattle();
        else if(gameState === "gameover") drawGameOver();
        else if(gameState === "credits") drawCredits();
        else if(gameState === "group_photo") drawGroupPhoto();
    }
    
    // ==================== УПРАВЛЕНИЕ ====================
    function handleCanvasClick(e) {
        let rect = canvas.getBoundingClientRect();
        let mx = (e.clientX - rect.left) * (1280/rect.width);
        let my = (e.clientY - rect.top) * (720/rect.height);
        
        if(gameState === "menu") {
            if(mx>400 && mx<800) {
                if(my>230 && my<310) { startStorytelling(); applyDifficulty(); }
                else if(my>330 && my<410) {
                    if(currentDifficulty === "easy") currentDifficulty = "medium";
                    else if(currentDifficulty === "medium") currentDifficulty = "hard";
                    else currentDifficulty = "easy";
                    applyDifficulty();
                    renderGame();
                }
                else if(my>430 && my<510) { alert("Выход. Закрой вкладку."); }
            }
        } else if(gameState === "storytelling") {
            advanceStory();
        } else if(gameState === "cutscene") {
            advanceCutscene();
        } else if(gameState === "battle") {
            let yh = 120;
            for(let i=0;i<heroes.length;i++) {
                let yTop = yh + i*115;
                if(mx>30 && mx<480 && my>yTop && my<yTop+105 && heroes[i].hp>0) {
                    let useSkill = confirm(heroes[i].name + " — Атака (ОК) или Навык (Отмена)?");
                    selectedHero = i;
                    selectedAction = useSkill ? "skill" : "attack";
                    setMsg(heroes[i].name + ": " + selectedAction + ". Кликни по врагу!");
                    return;
                }
            }
            if(selectedHero !== null) {
                let ye = 140;
                for(let i=0;i<battleEnemies.length;i++) {
                    let yTop = ye + i*105;
                    if(mx>780 && mx<1200 && my>yTop && my<yTop+90 && battleEnemies[i].hp>0) {
                        playerBattle(selectedHero, selectedAction, i);
                        selectedHero = null;
                        return;
                    }
                }
            }
        }
    }
    
    function handleKey(e) {
        if(gameState === "gameplay") {
            if(e.key === 'ArrowUp' || e.key === 'w') tryMove(0,-1);
            if(e.key === 'ArrowDown' || e.key === 's') tryMove(0,1);
            if(e.key === 'ArrowLeft' || e.key === 'a') tryMove(-1,0);
            if(e.key === 'ArrowRight' || e.key === 'd') tryMove(1,0);
        } else if(gameState === "battle" && e.key === ' ') {
            e.preventDefault();
            attemptEscape();
        }
    }
    
    function resetGame() {
        gameState = "menu";
        currentLevel = 1;
        selectedHero = null;
        for(let h of heroes) {
            h.hp = h.maxHp;
            h.mp = h.maxMp;
            h.exp = 0;
            h.level = 1;
        }
        applyDifficulty();
        renderGame();
    }
    
    function goToMenu() {
        if(gameState !== "battle") {
            gameState = "menu";
            renderGame();
        } else {
            setMsg("Сначала закончи бой!");
        }
    }
    
    window.addEventListener("keydown", handleKey);
    canvas.addEventListener("click", handleCanvasClick);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("menuBtn").addEventListener("click", goToMenu);
    applyDifficulty();
    renderGame();
})();
</script>
</body>
</html>
