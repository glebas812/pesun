<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>College Brawl — Идеальный баланс v3.0</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a, #03060a);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Courier New', monospace; margin: 0; padding: 20px;
        }
        .game-container {
            background: #0d0a07; border-radius: 32px;
            padding: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        canvas {
            display: block; margin: 0 auto; border-radius: 20px;
            cursor: pointer; box-shadow: 0 0 0 4px #6b4c34;
        }
        .info-panel {
            margin-top: 18px; display: flex; justify-content: space-between;
            align-items: center; gap: 15px; flex-wrap: wrap;
            background: #1b1510; padding: 12px 28px; border-radius: 60px;
        }
        .status {
            background: #000000aa; padding: 10px 28px; border-radius: 50px;
            color: #ffdfa5; font-weight: bold; backdrop-filter: blur(4px);
            font-size: 16px; font-family: monospace;
        }
        button {
            background: #8b3c1a; border: none; font-family: monospace;
            font-weight: bold; font-size: 15px; padding: 10px 32px;
            border-radius: 50px; color: #fff0cf; cursor: pointer;
            box-shadow: 0 4px 0 #4f240c;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #4f240c; }
        .diff-indicator {
            background: #2a2a1a; padding: 6px 15px; border-radius: 30px;
            font-size: 13px; color: #ffcc88;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div class="info-panel">
            <div class="status" id="gameStatus">🏫 COLLEGE BRAWL | ИДЕАЛЬНЫЙ БАЛАНС</div>
            <div class="diff-indicator" id="diffIndicator">СРЕДНЯЯ</div>
            <button id="resetBtn">🔄 СБРОС</button>
            <button id="menuBtn">🎮 МЕНЮ</button>
        </div>
    </div>
</div>

<script>
(function(){
    // ==================== СОСТОЯНИЕ ====================
    let gameState = "menu";  // menu, storytelling, gameplay, battle, cutscene, gameover, credits
    let currentLevel = 1;
    let cutsceneType = null;
    let cutsceneStep = 0;
    let storyStep = 0;
    let escapeChoiceActive = false;
    
    // ==================== КАРТЫ УРОВНЕЙ ====================
    let currentMap = { width: 20, height: 15, tiles: [], healZones: [], enemies: [], doors: [] };
    let player = { x: 10, y: 7 };
    
    function buildMapClass() {
        let w=20, h=15;
        let tiles = Array(h).fill().map(function() { return Array(w).fill(0); });
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=3;k<8;k++) { tiles[5][k]=2; tiles[8][k]=2; }
        tiles[10][5]=2; tiles[10][6]=2;
        tiles[12][w-2] = 3;
        return { 
            width:w, height:h, tiles: tiles, 
            healZones: [
                {x:5,y:3, used:false},{x:5,y:4, used:false},{x:5,y:5, used:false},
                {x:5,y:6, used:false},{x:5,y:7, used:false},{x:8,y:3, used:false},
                {x:8,y:4, used:false},{x:8,y:5, used:false},{x:8,y:6, used:false},
                {x:8,y:7, used:false},{x:10,y:5, used:false},{x:10,y:6, used:false}
            ],
            enemies: [
                {x:11, y:12, type:"freshman", alive:true, name:"Двоечник"},
                {x:14, y:6, type:"bully", alive:true, name:"Задира"},
                {x:8, y:11, type:"freshman", alive:true, name:"Двоечник"},
                {x:6, y:4, type:"freshman", alive:true, name:"Двоечник"},
                {x:4, y:8, type:"bully", alive:true, name:"Задира"}
            ],
            doors: [{x:w-2, y:12, targetLevel:2}]
        };
    }
    
    function buildMapCorridor() {
        let w=25, h=18;
        let tiles = Array(h).fill().map(function() { return Array(w).fill(0); });
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=4;k<8;k++) { tiles[k][10]=1; tiles[k][15]=1; }
        tiles[12][20]=1; tiles[13][20]=1;
        tiles[3][5]=2; tiles[14][22]=2;
        tiles[8][w-2] = 3;
        return {
            width:w, height:h, tiles: tiles,
            healZones: [{x:3,y:5, used:false}, {x:14,y:22, used:false}],
            enemies: [
                {x:7, y:8, type:"teacher", alive:true, name:"Злой препод"},
                {x:15, y:9, type:"starosta", alive:true, name:"Староста"},
                {x:10, y:14, type:"teacher", alive:true, name:"Злой препод"},
                {x:18, y:7, type:"starosta", alive:true, name:"Староста"},
                {x:5, y:12, type:"teacher", alive:true, name:"Злой препод"}
            ],
            doors: [{x:w-2, y:8, targetLevel:3}]
        };
    }
    
    function buildMapCanteen() {
        let w=22, h=16;
        let tiles = Array(h).fill().map(function() { return Array(w).fill(0); });
        for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
        for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
        for(let k=4;k<10;k++) { tiles[6][k]=2; tiles[10][k]=2; }
        tiles[7][w-2] = 3;
        let healZones = [];
        for(let k=4;k<10;k++) { healZones.push({x:6,y:k, used:false}); healZones.push({x:10,y:k, used:false}); }
        return {
            width:w, height:h, tiles: tiles,
            healZones: healZones,
            enemies: [
                {x:15, y:8, type:"cook", alive:true, name:"Повариха"},
                {x:18, y:5, type:"bully", alive:true, name:"Задира"},
                {x:5, y:13, type:"freshman", alive:true, name:"Двоечник"},
                {x:14, y:13, type:"teacher", alive:true, name:"Злой препод"},
                {x:8, y:4, type:"cook", alive:true, name:"Повариха"},
                {x:12, y:11, type:"starosta", alive:true, name:"Староста"}
            ],
            doors: [{x:w-2, y:7, targetLevel:4}]
        };
    }
    
    function buildMapOffice() {
    let w=20, h=15;
    let tiles = Array(h).fill().map(function() { return Array(w).fill(0); });
    for(let i=0;i<h;i++) { tiles[i][0]=1; tiles[i][w-1]=1; }
    for(let j=0;j<w;j++) { tiles[0][j]=1; tiles[h-1][j]=1; }
    for(let k=8;k<12;k++) tiles[7][k]=2;
    tiles[5][10]=2; tiles[5][11]=2;
    
    // ========== ДОБАВЛЯЕМ ДВЕРЬ В ПРАВОМ НИЖНЕМ УГЛУ ==========
    tiles[13][w-2] = 3;   // Дверь на клетке (18, 13)
    
    return {
        width:w, height:h, tiles: tiles,
        healZones: [{x:7,y:8, used:false},{x:7,y:9, used:false},{x:7,y:10, used:false},{x:7,y:11, used:false},{x:5,y:10, used:false},{x:5,y:11, used:false}],
        enemies: [{x:10, y:7, type:"boss", alive:true, name:"ПРОРЕКТОР ТЕНЕЙ"}],
        doors: [{x:w-2, y:13, targetLevel:5}]  // Добавляем дверь в массив дверей
    };
}
    
    function loadLevel(level) {
        if(level === 1) currentMap = buildMapClass();
        else if(level === 2) currentMap = buildMapCorridor();
        else if(level === 3) currentMap = buildMapCanteen();
        else currentMap = buildMapOffice();
        player.x = Math.floor(currentMap.width/2);
        player.y = 5;
    }
    
    function getAliveEnemiesCount() {
        let cnt = 0;
        for(let i=0; i<currentMap.enemies.length; i++) {
            if(currentMap.enemies[i].alive) cnt++;
        }
        return cnt;
    }
    
    // ==================== ГЕРОИ (НОВЫЙ БАЛАНС + НАВЫКИ) ====================
    let heroes = [
        { id:0, name:"Глеб", role:"Танк", hp:800, maxHp:800, mp:120, maxMp:120, atk:55, def:100, 
          skills: [
              { name:"Умный удар", dmg:80, mpCost:8, effect:"defense_down", desc:"80 урона + снижение защиты врага" },
              { name:"Анализ слабости", mpCost:5, effect:"next_crit", desc:"Следующий удар критический" },
              { name:"Тактическая защита", mpCost:6, effect:"self_def_up", desc:"Защита +50% на 3 хода" }
          ], skillIndex:0, type:"dmg", exp:0, level:1,
          phrases:{ start:"Вероятность победы высока. Действуем по плану.", victory:"Тактика принесла результат.",
                    hit:"Просчёт... но не критично.", heal:"Благодарю.", death:"Ошибка в расчётах...", skill:"Сейчас всё просчитаю!" } },
        { id:1, name:"Игнат", role:"Дамагер", hp:650, maxHp:650, mp:20, maxMp:20, atk:120, def:50, 
          skills: [
              { name:"Гантеля", dmg:180, hpCost:10, desc:"180 урона, тратит 10 HP" },
              { name:"Штанга", dmg:120, hpCost:15, aoe:true, desc:"120 урона по всем врагам, тратит 15 HP" },
              { name:"Ярость", hpCost:8, effect:"self_atk_up", desc:"Атака +30% на 3 хода" }
          ], skillIndex:0, type:"dmg", exp:0, level:1,
          phrases:{ start:"ГА! ШТАНГУ ПОДНЯЛ! СЕЙЧАС РАЗНЕСУ!", victory:"ГА! ПОБЕДА! ИДУ КАЧАТЬСЯ!",
                    hit:"ФУХ! БЕЛОК ПОМОЖЕТ!", heal:"ФУХ... ТЕПЕРЬ ПОШЛО!", death:"ГАНТЕЛЯ... ВЫПАЛА...", skill:"ПОЛУЧАЙ!" } },
        { id:2, name:"Одирлбекк", role:"Стекло-пушка", hp:450, maxHp:450, mp:40, maxMp:40, atk:140, def:35, 
          skills: [
              { name:"Теневой удар", dmg:200, hpCost:12, desc:"200 урона, тратит 12 HP" },
              { name:"Смертельный клинок", dmg:150, hpCost:15, instakill:0.15, desc:"150 урона + 15% шанс убить" },
              { name:"Теневая стена", hpCost:10, effect:"dodge_next", desc:"Уклонение от следующей атаки" }
          ], skillIndex:0, type:"dmg", exp:0, level:1,
          phrases:{ start:"...", victory:"...", hit:"...кх...", heal:"...", death:"......", skill:"...умри." } },
        { id:3, name:"Ярик", role:"Хилер/Баффер", hp:400, maxHp:400, mp:140, maxMp:140, atk:30, def:40, 
          skills: [
              { name:"Логичное лечение", heal:120, mpCost:18, desc:"120 HP союзнику" },
              { name:"Рациональный бафф", mpCost:18, effect:"party_buff", desc:"ATK/DEF всех +20%" },
              { name:"Умный щит", mpCost:15, effect:"shield", desc:"Снижение урона на 50% союзнику" }
          ], skillIndex:0, type:"heal", exp:0, level:1,
          phrases:{ start:"По факту, шанс на победу 78%. Действуем.", victory:"Логично. Мы справились.",
                    hit:"Предсказуемо.", heal:"Рационально восстанавливаю.", death:"Просчёт...", skill:"Оптимальное решение." } }
    ];
    
    // Баффы и дебаффы
    let activeBuffs = { partyAtkDef: 0, selfDefUp: {}, selfAtkUp: {}, nextCrit: {}, dodgeNext: {}, shield: {} };
    
    function applyBuffs() {
        for(let h of heroes) {
            let bonusAtk = 1, bonusDef = 1;
            if(activeBuffs.partyAtkDef > 0) { bonusAtk = 1.2; bonusDef = 1.2; }
            if(activeBuffs.selfAtkUp[h.id] > 0) bonusAtk *= 1.3;
            if(activeBuffs.selfDefUp[h.id] > 0) bonusDef *= 1.5;
            h.currentAtk = Math.floor(h.atk * bonusAtk);
            h.currentDef = Math.floor(h.def * bonusDef);
        }
    }
    
    // ==================== ВРАГИ (УСИЛЕННЫЕ) ====================
    const enemyDB = {
        freshman: { name:"Двоечник", hp:550, atk:65, def:35, exp:70, dialog:"Чё надо? Списывать мешаете!" },
        bully: { name:"Задира", hp:700, atk:85, def:40, exp:100, dialog:"Слабаки! Идите отсюда!" },
        teacher: { name:"Злой препод", hp:900, atk:105, def:50, exp:160, dialog:"Двойка! Вызвать родителей!" },
        starosta: { name:"Староста", hp:800, atk:95, def:45, exp:140, dialog:"Всё директору расскажу!" },
        cook: { name:"Повариха", hp:850, atk:100, def:48, exp:150, dialog:"Отравленный компот получите!", poison:true },
        boss: { name:"ПРОРЕКТОР ТЕНЕЙ", hp:2000, atk:130, def:70, exp:800, dialog:"Изгнание из колледжа!" }
    };
    
    let battleEnemies = [];
    let inBattleTurn = "player";
    let selectedHero = null;
    let selectedSkill = null;
    let enemyDebuffs = {}; // { enemyIdx: { defenseDown: turns, poison: turns } }
    
    let currentDifficulty = "medium";
    
    function applyDifficulty() {
        let modHeroHp = 1, modHeroAtk = 1, modEnemyHp = 1, modEnemyAtk = 1;
        if(currentDifficulty === "easy") { modHeroHp = 1.2; modHeroAtk = 1.1; modEnemyHp = 0.8; modEnemyAtk = 0.8; }
        if(currentDifficulty === "hard") { modHeroHp = 0.9; modHeroAtk = 0.95; modEnemyHp = 1.3; modEnemyAtk = 1.2; }
        for(let h of heroes) {
            let baseHp = (h.id===0?800: h.id===1?650: h.id===2?450:400);
            let baseAtk = (h.id===0?55: h.id===1?120: h.id===2?140:30);
            h.maxHp = Math.floor(baseHp * modHeroHp);
            h.hp = h.maxHp;
            h.atk = Math.floor(baseAtk * modHeroAtk);
        }
        window.enemyMod = { hp: modEnemyHp, atk: modEnemyAtk };
        document.getElementById("diffIndicator").innerText = currentDifficulty === "easy" ? "🍃 ЛЁГКАЯ" : (currentDifficulty === "medium" ? "⚖️ СРЕДНЯЯ" : "🔥 ТЯЖЁЛАЯ");
    }
    
    function scaleEnemy(e) {
        let mod = window.enemyMod || { hp:1, atk:1 };
        return {
            name: e.name, hp: Math.floor(e.hp * mod.hp), maxHp: Math.floor(e.hp * mod.hp),
            atk: Math.floor(e.atk * mod.atk), def: e.def, exp: e.exp, dialog: e.dialog, poison: e.poison || false
        };
    }
    
    function healAtZone(zone) {
        if(zone.used) { setMsg("💊 Здесь уже отдыхали!"); return false; }
        for(let h of heroes) {
            h.hp = Math.min(h.maxHp, h.hp + 120);
            h.mp = Math.min(h.maxMp, h.mp + 50);
        }
        zone.used = true;
        setMsg("💊 Отдых! +120 HP, +50 MP");
        return true;
    }
    
    function addExp(amount) {
        for(let h of heroes) {
            h.exp += amount;
            if(h.exp >= 100 && h.level < 6) {
                h.level++;
                h.exp = 0;
                h.maxHp = Math.floor(h.maxHp * 1.08);
                h.hp = h.maxHp;
                h.atk = Math.floor(h.atk * 1.05);
                h.def = Math.floor(h.def * 1.05);
                setMsg("✨ " + h.name + " → " + h.level + " уровень! ✨");
            }
        }
    }
    
    function setMsg(msg) { 
        let div = document.getElementById("gameStatus");
        if(div) div.innerText = msg;
    }
    
    // ==================== БОЕВАЯ СИСТЕМА ====================
    function startBattle(enemyType) {
        let template = enemyDB[enemyType];
        if(!template) return;
        battleEnemies = [scaleEnemy(template)];
        if(enemyType === "teacher") battleEnemies.push(scaleEnemy(enemyDB.starosta));
        if(enemyType === "freshman") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        if(enemyType === "bully") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        if(enemyType === "cook") battleEnemies.push(scaleEnemy(enemyDB.freshman));
        gameState = "battle";
        inBattleTurn = "player";
        selectedHero = null;
        enemyDebuffs = {};
        activeBuffs = { partyAtkDef: 0, selfDefUp: {}, selfAtkUp: {}, nextCrit: {}, dodgeNext: {}, shield: {} };
        applyBuffs();
        setMsg(heroes[0].phrases.start);
        renderGame();
    }
    
    function useHeroSkill(hero, skillIdx, targetEnemyIdx, targetAllyIdx) {
        let skill = hero.skills[skillIdx];
        
        // Проверка ресурсов
        if(skill.hpCost && hero.hp <= skill.hpCost) { setMsg("❗ Мало HP!"); return false; }
        if(skill.mpCost && hero.mp < skill.mpCost) { setMsg("❗ Мало MP!"); return false; }
        
        // Обработка эффектов
        if(skill.heal) {
            let target = targetAllyIdx !== undefined ? heroes[targetAllyIdx] : heroes.find(h => h.hp < h.maxHp) || heroes[0];
            target.hp = Math.min(target.maxHp, target.hp + skill.heal);
            hero.mp -= skill.mpCost;
            setMsg(hero.phrases.skill + " +" + skill.heal + " HP для " + target.name);
            return true;
        }
        
        if(skill.effect === "party_buff") {
            activeBuffs.partyAtkDef = 3;
            hero.mp -= skill.mpCost;
            setMsg(hero.phrases.skill + " ATK/DEF группы +20%!");
            applyBuffs();
            return true;
        }
        
        if(skill.effect === "shield") {
            let target = targetAllyIdx !== undefined ? heroes[targetAllyIdx] : heroes[0];
            activeBuffs.shield[target.id] = 2;
            hero.mp -= skill.mpCost;
            setMsg(hero.phrases.skill + " " + target.name + " получает щит -50% урона!");
            return true;
        }
        
        if(skill.effect === "self_def_up") {
            activeBuffs.selfDefUp[hero.id] = 3;
            hero.mp -= skill.mpCost;
            setMsg(hero.phrases.skill + " Защита +50%!");
            applyBuffs();
            return true;
        }
        
        if(skill.effect === "self_atk_up") {
            activeBuffs.selfAtkUp[hero.id] = 3;
            if(skill.hpCost) hero.hp -= skill.hpCost;
            setMsg(hero.phrases.skill + " Атака +30%!");
            applyBuffs();
            return true;
        }
        
        if(skill.effect === "next_crit") {
            activeBuffs.nextCrit[hero.id] = true;
            hero.mp -= skill.mpCost;
            setMsg(hero.phrases.skill + " Следующий удар критический!");
            return true;
        }
        
        if(skill.effect === "dodge_next") {
            activeBuffs.dodgeNext[hero.id] = true;
            if(skill.hpCost) hero.hp -= skill.hpCost;
            setMsg(hero.phrases.skill + " Уклонение от следующей атаки!");
            return true;
        }
        
        // Урон
        let target = battleEnemies[targetEnemyIdx];
        if(!target) return false;
        
        let def = target.def;
        if(enemyDebuffs[targetEnemyIdx]?.defenseDown) def = Math.floor(def * 0.8);
        
        let dmg = hero.currentAtk * 2 + skill.dmg + Math.floor(Math.random() * 40);
        if(activeBuffs.nextCrit[hero.id]) { dmg = Math.floor(dmg * 1.5); activeBuffs.nextCrit[hero.id] = false; setMsg("💥 КРИТИЧЕСКИЙ УДАР!"); }
        let finalDmg = Math.max(25, dmg - def);
        
        if(skill.instakill && Math.random() < skill.instakill) {
            target.hp = 0;
            setMsg("💀 " + hero.name + " МГНОВЕННО УБИЛ " + target.name + "!");
        } else {
            target.hp -= finalDmg;
            setMsg(hero.phrases.skill + " → " + target.name + " -" + finalDmg + " урона!");
        }
        
        if(skill.aoe) {
            for(let i=0; i<battleEnemies.length; i++) {
                if(i !== targetEnemyIdx && battleEnemies[i].hp > 0) {
                    let aoeDmg = Math.floor(finalDmg * 0.6);
                    battleEnemies[i].hp -= aoeDmg;
                    setMsg("💥 Осколочный урон по " + battleEnemies[i].name + " -" + aoeDmg);
                }
            }
        }
        
        if(skill.effect === "defense_down") {
            if(!enemyDebuffs[targetEnemyIdx]) enemyDebuffs[targetEnemyIdx] = {};
            enemyDebuffs[targetEnemyIdx].defenseDown = true;
            setMsg("⬇️ Защита врага снижена!");
        }
        
        if(skill.hpCost) hero.hp -= skill.hpCost;
        if(skill.mpCost) hero.mp -= skill.mpCost;
        
        return true;
    }
    
    function heroAttack(hero, enemyIdx) {
        let enemy = battleEnemies[enemyIdx];
        let def = enemy.def;
        if(enemyDebuffs[enemyIdx]?.defenseDown) def = Math.floor(def * 0.8);
        let dmg = hero.currentAtk + Math.floor(Math.random() * 25) - def;
        if(activeBuffs.nextCrit[hero.id]) { dmg = Math.floor(dmg * 1.5); activeBuffs.nextCrit[hero.id] = false; setMsg("💥 КРИТИЧЕСКИЙ УДАР!"); }
        dmg = Math.max(8, dmg);
        enemy.hp -= dmg;
        setMsg(hero.name + " атакует! → -" + dmg + " HP!");
        return true;
    }
    
    function attemptEscape() {
        if(gameState !== "battle" || inBattleTurn !== "player") return false;
        let chance = (currentDifficulty === "easy") ? 0.7 : (currentDifficulty === "medium") ? 0.5 : 0.3;
        if(Math.random() < chance) {
            setMsg("🏃‍♂️ Удалось сбежать!");
            gameState = "gameplay";
            renderGame();
            return true;
        } else {
            setMsg("😵 Не удалось сбежать! Враги атакуют!");
            inBattleTurn = "enemy";
            renderGame();
            setTimeout(() => enemyBattleTurn(), 400);
            return false;
        }
    }
    
    function enemyBattleTurn() {
        let alive = heroes.filter(h => h.hp > 0);
        if(alive.length === 0) { gameState = "gameover"; renderGame(); return; }
        
        // Обновление баффов
        if(activeBuffs.partyAtkDef > 0) activeBuffs.partyAtkDef--;
        for(let h of heroes) {
            if(activeBuffs.selfDefUp[h.id] > 0) activeBuffs.selfDefUp[h.id]--;
            if(activeBuffs.selfAtkUp[h.id] > 0) activeBuffs.selfAtkUp[h.id]--;
            if(activeBuffs.dodgeNext[h.id] !== undefined) activeBuffs.dodgeNext[h.id] = false;
            if(activeBuffs.shield[h.id] > 0) activeBuffs.shield[h.id]--;
        }
        applyBuffs();
        
        for(let ei=0; ei<battleEnemies.length; ei++) {
            let e = battleEnemies[ei];
            if(e.hp <= 0) continue;
            let target = alive[Math.floor(Math.random() * alive.length)];
            let dmg = e.atk + Math.floor(Math.random() * 20) - Math.floor(target.currentDef / 2);
            if(activeBuffs.shield[target.id] > 0) dmg = Math.floor(dmg * 0.5);
            if(activeBuffs.dodgeNext[target.id]) { dmg = 0; setMsg(target.name + " уклонился!"); activeBuffs.dodgeNext[target.id] = false; }
            dmg = Math.max(5, dmg);
            target.hp -= dmg;
            setMsg(e.name + ": " + e.dialog + " → " + target.name + " -" + dmg + " HP");
            if(target.hp <= 0) setMsg(target.name + " без сознания! " + (target.phrases.death || ""));
            if(e.poison && Math.random()<0.3) { target.hp -= 20; setMsg("☠️ Отравление! -20 HP"); }
        }
        
        if(heroes.every(h => h.hp <= 0)) { gameState = "gameover"; renderGame(); return; }
        if(battleEnemies.every(e => e.hp <= 0)) {
            let totalExp = battleEnemies.reduce((s,e) => s + e.exp, 0);
            addExp(totalExp);
            let winner = heroes.find(h => h.hp > 0);
            setMsg("ПОБЕДА! " + (winner ? winner.phrases.victory : "") + " +" + totalExp + " опыта");
            for(let em of currentMap.enemies) {
                if(em.alive && em.name === battleEnemies[0]?.name) { em.alive = false; break; }
            }
            // Победа над боссом → сразу финал!
            if(currentLevel === 4 && battleEnemies[0]?.name === "ПРОРЕКТОР ТЕНЕЙ") {
                startCredits();
                return;
            }
            gameState = "gameplay";
            renderGame();
            return;
        }
        inBattleTurn = "player";
        renderGame();
    }
    
    function playerBattle(heroIdx, skillIdx, targetEnemyIdx, targetAllyIdx) {
        if(gameState !== "battle" || inBattleTurn !== "player") return false;
        let hero = heroes[heroIdx];
        if(hero.hp <= 0) { setMsg(hero.name + " без сознания!"); return false; }
        
        let ok = false;
        if(skillIdx === -1) {
            ok = heroAttack(hero, targetEnemyIdx);
        } else {
            ok = useHeroSkill(hero, skillIdx, targetEnemyIdx, targetAllyIdx);
        }
        if(!ok) return false;
        
        if(battleEnemies.every(e => e.hp <= 0)) {
            let totalExp = battleEnemies.reduce((s,e) => s + e.exp, 0);
            addExp(totalExp);
            setMsg("ПОБЕДА! +" + totalExp + " опыта");
            if(currentLevel === 4) { startCredits(); return true; }
            gameState = "gameplay";
            renderGame();
            return true;
        }
        inBattleTurn = "enemy";
        renderGame();
        setTimeout(() => enemyBattleTurn(), 500);
        return true;
    }

    function tryMove(dx, dy) {
        if(gameState !== "gameplay") return;
        let nx = player.x + dx, ny = player.y + dy;
        if(nx<0 || nx>=currentMap.width || ny<0 || ny>=currentMap.height) return;
        if(currentMap.tiles[ny][nx] === 1) return;
        if(currentMap.tiles[ny][nx] === 2) {
            let zone = currentMap.healZones.find(z => z.x === nx && z.y === ny);
            if(zone) healAtZone(zone);
        }
        if(currentMap.tiles[ny][nx] === 3) {
            if(getAliveEnemiesCount() > 0) { startCutscene("escape_attempt"); return; }
            else {
                if(currentLevel === 1) startCutscene("level1_complete");
                else if(currentLevel === 2) startCutscene("level2_complete");
                else if(currentLevel === 3) startCutscene("level3_complete");
                return;
            }
        }
        player.x = nx; player.y = ny;
        let enemy = currentMap.enemies.find(e => e.alive && e.x === player.x && e.y === player.y);
        if(enemy) { enemy.alive = false; startBattle(enemy.type); }
        renderGame();
    }

    let canvas = document.getElementById("gameCanvas");

    function drawWrappedText(text, x, y, maxW, lineH, fontSize) {
        ctx.font = fontSize + "px monospace";
        let line = '';
        for(let i=0;i<text.length;i++) {
            let test = line + text[i];
            if(ctx.measureText(test).width > maxW && line.length>0) {
                ctx.fillText(line, x, y);
                line = text[i];
                y += lineH;
            } else { line = test; }
        }
        ctx.fillText(line, x, y);
    }

    function drawGameplay() {
        ctx.fillStyle = "#1f2a1b"; ctx.fillRect(0,0,1280,720);
        let tw = 1280/currentMap.width;
        let th = 720/currentMap.height;
        for(let y=0;y<currentMap.height;y++){
            for(let x=0;x<currentMap.width;x++){
                let tile = currentMap.tiles[y][x];
                let col = "#8faa7b";
                if(tile===1) col = "#5a4232";
                else if(tile===2) col = "#8fbc6e";
                else if(tile===3) col = "#d4a259";
                ctx.fillStyle = col; ctx.fillRect(x*tw, y*th, tw-1, th-1);
                if(tile===2) { 
                    let zone = currentMap.healZones.find(z => z.x === x && z.y === y);
                    if(!zone || !zone.used) { ctx.fillStyle="#a5d66b"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("💊", x*tw+tw/3, y*th+th-8); }
                }
                if(tile===3) { ctx.fillStyle="#ffd966"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("🚪", x*tw+tw/4, y*th+th-8); }
            }
        }
        for(let e of currentMap.enemies) {
            if(e.alive) {
                ctx.fillStyle = "#c2422a"; ctx.beginPath(); ctx.arc(e.x*tw+tw/2, e.y*th+th/2, th/3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.font="bold "+(th/2.5)+"px monospace"; ctx.fillText("👹", e.x*tw+tw/3, e.y*th+th-10);
            }
        }
        ctx.fillStyle = "#4a86c9"; ctx.fillRect(player.x*tw+5, player.y*th+5, tw-10, th-10);
        ctx.fillStyle = "white"; ctx.font="bold "+(th/2)+"px monospace"; ctx.fillText("😎", player.x*tw+tw/3.5, player.y*th+th-12);
        
        ctx.fillStyle = "#2a241ecc"; ctx.fillRect(0,0,550,200);
        ctx.fillStyle = "#ffdfa5"; ctx.font = "20px monospace"; 
        let levelNames = ["", "КЛАСС", "КОРИДОР", "СТОЛОВАЯ", "КАБИНЕТ"];
        ctx.fillText("📍 " + levelNames[currentLevel], 15, 40);
        let aliveCnt = currentMap.enemies.filter(e => e.alive).length;
        ctx.fillText("👥 Врагов: " + aliveCnt, 15, 75);
        let availableHeals = currentMap.healZones.filter(z => !z.used).length;
        ctx.fillText("💊 Лечений осталось: " + availableHeals, 15, 110);
        if(aliveCnt > 0) ctx.fillText("⚠️ ПОБЕДИ ВСЕХ ВРАГОВ!", 15, 150);
        else ctx.fillText("✅ МОЖНО УХОДИТЬ ЧЕРЕЗ ДВЕРЬ!", 15, 150);
    }

    // ==================== УПРАВЛЕНИЕ ====================
    function handleCanvasClick(e) {
        let rect = canvas.getBoundingClientRect();
        let mx = (e.clientX - rect.left) * (1280/rect.width);
        let my = (e.clientY - rect.top) * (720/rect.height);
        
        if(gameState === "menu") {
            if(mx>400 && mx<800) {
                if(my>230 && my<310) { startStorytelling(); applyDifficulty(); }
                else if(my>330 && my<410) {
                    if(currentDifficulty === "easy") currentDifficulty = "medium";
                    else if(currentDifficulty === "medium") currentDifficulty = "hard";
                    else currentDifficulty = "easy";
                    applyDifficulty();
                    renderGame();
                }
                else if(my>430 && my<510) { alert("Выход. Закрой вкладку."); }
            }
        } else if(gameState === "storytelling") {
            advanceStory();
        } else if(gameState === "cutscene") {
            advanceCutscene();
        } else if(gameState === "battle") {
            let yh = 120;
            for(let i=0;i<heroes.length;i++) {
                let yTop = yh + i*130;
                if(mx>30 && mx<510 && my>yTop && my<yTop+110 && heroes[i].hp>0) {
                    let hero = heroes[i];
                    let skillNames = hero.skills.map((s, idx) => idx + ": " + s.name).join("\n");
                    let skillChoice = prompt(hero.name + " - выбери действие:\n0: Атака\n" + 
                        hero.skills.map((s, idx) => (idx+1) + ": " + s.name + " (" + s.desc + ")").join("\n"));
                    if(skillChoice === null) return;
                    if(skillChoice === "0") {
                        selectedHero = i;
                        selectedSkill = -1;
                        setMsg(hero.name + ": атака. Кликни по врагу!");
                    } else {
                        let idx = parseInt(skillChoice) - 1;
                        if(idx >= 0 && idx < hero.skills.length) {
                            selectedHero = i;
                            selectedSkill = idx;
                            let skill = hero.skills[idx];
                            if(skill.heal || skill.effect === "shield") {
                                setMsg(hero.name + ": " + skill.name + ". Кликни по союзнику!");
                            } else {
                                setMsg(hero.name + ": " + skill.name + ". Кликни по врагу!");
                            }
                        } else { setMsg("Неверный выбор!"); }
                    }
                    return;
                }
            }
            if(selectedHero !== null) {
                let hero = heroes[selectedHero];
                let skill = selectedSkill >= 0 ? hero.skills[selectedSkill] : null;
                let isHealOrShield = skill && (skill.heal || skill.effect === "shield");
                
                if(isHealOrShield) {
                    let yh = 120;
                    for(let i=0;i<heroes.length;i++) {
                        let yTop = yh + i*130;
                        if(mx>30 && mx<510 && my>yTop && my<yTop+110 && heroes[i].hp > 0) {
                            playerBattle(selectedHero, selectedSkill, null, i);
                            selectedHero = null; selectedSkill = null;
                            return;
                        }
                    }
                } else {
                    let ye = 140;
                    for(let i=0;i<battleEnemies.length;i++) {
                        let yTop = ye + i*115;
                        if(mx>780 && mx<1200 && my>yTop && my<yTop+95 && battleEnemies[i].hp>0) {
                            playerBattle(selectedHero, selectedSkill, i, null);
                            selectedHero = null; selectedSkill = null;
                            return;
                        }
                    }
                }
            }
        }
    }
    
    function handleKey(e) {
        if(gameState === "gameplay") {
            if(e.key === 'ArrowUp' || e.key === 'w') tryMove(0,-1);
            if(e.key === 'ArrowDown' || e.key === 's') tryMove(0,1);
            if(e.key === 'ArrowLeft' || e.key === 'a') tryMove(-1,0);
            if(e.key === 'ArrowRight' || e.key === 'd') tryMove(1,0);
        } else if(gameState === "battle" && e.key === ' ') {
            e.preventDefault();
            attemptEscape();
        }
    }
    
    function resetGame() {
        gameState = "menu";
        currentLevel = 1;
        selectedHero = null;
        for(let h of heroes) {
            h.hp = h.maxHp;
            h.mp = h.maxMp;
            h.exp = 0;
            h.level = 1;
        }
        applyDifficulty();
        renderGame();
    }
    
    function goToMenu() {
        if(gameState !== "battle") {
            gameState = "menu";
            renderGame();
        } else {
            setMsg("Сначала закончи бой!");
        }
    }
    
    window.addEventListener("keydown", handleKey);
    canvas.addEventListener("click", handleCanvasClick);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("menuBtn").addEventListener("click", goToMenu);
    applyDifficulty();
    renderGame();
})();
</script>
</body>
</html>
